---
name: "business_bi_dbt"
version: "1.0.0"
config-version: 2
require-dbt-version: '>=1.12.0'

profile: business_bi_dbt

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"  # directory which will store compiled SQL files
clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"

on-run-start:
  - '{{ create_udfs() }}'

seeds:
  +schema: bronze

flags:
  use_colors: true
  printer_width: 120
  send_anonymous_usage_stats: false

snapshots:
  +target: dev
  +dataset: snapshot{%- if target.name in ["dev", "dev-2"] -%}_dev{%- endif -%}

models:
  +on_schema_change: "append_new_columns"

  business_bi_dbt:
    +persist_docs:
      relation: true
      columns: true

    bronze:
      +dataset: bronze{%- if target.name == "dev" -%}_dev{%- endif -%}
      +tags: [layer:bronze, dataset:bronze]
      +labels:
        dataset: bronze
        layer: bronze

    silver:
      +dataset: silver{%- if target.name == "dev" -%}_dev{%- endif -%}
      +tags: [layer:silver, dataset:silver]
      +labels:
        dataset: silver
        layer: silver

    gold:
      +dataset: gold{%- if target.name == "dev" -%}_dev{%- endif -%}
      +tags: [layer:gold, dataset:gold]
      +labels:
        dataset: gold
        layer: gold
