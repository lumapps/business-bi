---
extends: default
ignore: |
  venv/
  venv-meltano/
  templates/
  dbt_project.yml
  .github/workflows/
  .github/actions/
rules:
  line-length:
    max: 130
  comments-indentation: disable
  comments:
    require-starting-space: true
    ignore-shebangs: true
    min-spaces-from-content: 1
  truthy:
    allowed-values: ['true', 'false', 'yes', 'no']
    check-keys: false
